interface:
  display_name: "HOI4 Review and Debug"
  short_description: "Audit, improve, balance, diagnose, and test HOI4 mods"
  default_prompt: "Use $hoi4-review-debug to establish a read-only cross-file baseline, understand player-facing intent, and improve this existing HOI4 mod with evidence. Separate objective defects from subjective design or balance choices and obtain approval before the latter. For crashes, ask for exact pre-crash actions and consent before minimal lawful native analysis; separately ask before controlling Steam or launching an isolated -debug test."
