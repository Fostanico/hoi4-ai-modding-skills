interface:
  display_name: "HOI4 Review and Debug"
  short_description: "Audit, improve, balance, diagnose, and test HOI4 mods"
  default_prompt: "Use $hoi4-review-debug to establish a read-only cross-file baseline, understand player-facing intent, and improve this existing HOI4 mod with evidence. Separate objective defects from subjective design or balance choices and obtain approval before the latter. For crashes, ask for exact pre-crash actions and the governing jurisdiction, then use separate consent gates for minimum WinDbg analysis, verified Ghidra/JDK acquisition and deeper lawful static analysis, and live-process/full-dump or hardware-breakpoint diagnosis. Never infer jurisdiction from language; separately ask before controlling Steam or launching an isolated -debug test."
